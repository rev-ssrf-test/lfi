<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XXE Test - External SVG Method</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: white;
            padding: 20px;
        }
        h1 { 
            color: #c00; 
            font-size: 28px;
        }
    </style>
</head>
<body>

    <h1>🔴 XXE Test - External SVG File</h1>
    
    <p style="font-size: 14px; color: #666;">
        Loading external SVG with XXE payload...
    </p>
    
    <!-- Load SVG as external object -->
    <object data="xxe-oob-external.svg" 
            type="image/svg+xml" 
            width="700" 
            height="500"
            style="border: 2px solid #c00;">
        <p>SVG not supported</p>
    </object>
    
    <hr>
    
    <!-- Alternative: img tag -->
    <h2>Alternative: IMG tag method</h2>
    <img src="xxe-oob-external.svg" 
         width="700" 
         height="500" 
         style="border: 2px solid #999;">
    
    <hr>
    
    <!-- Alternative: embed tag -->
    <h2>Alternative: EMBED tag method</h2>
    <embed src="xxe-oob-external.svg" 
           type="image/svg+xml"
           width="700" 
           height="500" 
           style="border: 2px solid #666;">

</body>
</html>
